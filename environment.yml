# Conda environment for installing sarpyx with ESA SNAP GPT.
#
# Create/update a local prefix from the repository root:
#
#   conda env create -p .conda/sarpyx -f environment.yml
#   conda activate .conda/sarpyx
#
# Or update an existing environment:
#
#   conda env update -p .conda/sarpyx -f environment.yml --prune
#
# Verify SNAP and sarpyx:
#
#   which gpt
#   gpt -h
#   sarpyx --help
#   sarpyx-pipeline --help
#
# Notes:
# - This environment installs SNAP 13 through the sirbastiano dev label.
# - sarpyx is installed editable with the copernicus extra.
# - GLIBC is intentionally NOT installed here. If SNAP/JLinda/jblas requires
#   GLIBC >= 2.29 on an older HPC node, use Apptainer/Singularity or a newer node.
# - The nodefaults channel entry prevents defaults from being mixed into the solve.
# - conda-forge provides the HDF5 shared library through the hdf5 package; there
#   is no separate installable libhdf5 package name on conda-forge.

name: sarpyx

channels:
  - https://conda.anaconda.org/sirbastiano/label/dev
  - https://conda.anaconda.org/conda-forge
  - nodefaults

dependencies:
  # Core runtime
  - python=3.12
  - pip
  - setuptools
  - wheel

  # SNAP / Java runtime
  - snap13=13.0.0=3
  - openjdk

  # Native numerical/runtime libraries
  - libgcc-ng
  - libstdcxx-ng
  - libgfortran-ng
  - libgfortran5
  - openblas
  - libblas=*=*openblas
  - liblapack=*=*openblas

  # HDF / NetCDF / geospatial native stack
  - hdf5
  - netcdf4
  - libnetcdf
  - gdal
  - proj
  - geos
  - sqlite

  # Python geospatial/scientific stack often needed by SAR/EO workflows
  - numpy
  - scipy
  - pandas
  - xarray
  - dask
  - zarr
  - rasterio
  - shapely
  - pyproj
  - fiona
  - geopandas
  - rioxarray
  - tqdm
  - pyyaml
  - click

  # Optional but useful for downloads / Copernicus workflows
  - requests
  - aiohttp
  - lxml

  - pip:
      - -e .[copernicus]
