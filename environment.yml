# Conda environment for installing sarpyx with ESA SNAP GPT.
#
# Create/update a local prefix from the repository root:
#   conda env create -p .conda/sarpyx -f environment.yml
#   conda activate .conda/sarpyx
#
# Verify SNAP and sarpyx:
#   gpt -h
#   sarpyx --help
#   sarpyx-pipeline --help
#
# For SNAP-heavy workflows, source the helper after activation:
#   gpt -h
#
# SNAP is installed through the sirbastiano dev label. sarpyx is installed
# editable with the copernicus extra so phidown is available in the env.
name: sarpyx
channels:
  - sirbastiano/label/dev
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - snap13=13.0.0
  - pip:
      - -e .[copernicus]
